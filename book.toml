[book]
authors = ["Rodrigo Zamperlini"]
language = "en"
multilingual = false
src = "src"
title = "Rodrigo Zamperlini | Integration & Solution Architecture"
description = "Portfolio for solution architecture, integration architecture, Power Platform, and enterprise systems."

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/YOUR_GITHUB_USERNAME/rodrigo-mdbook-portfolio"
edit-url-template = "https://github.com/YOUR_GITHUB_USERNAME/rodrigo-mdbook-portfolio/edit/main/{path}"
additional-css = ["theme/custom.css"]
additional-js = ["theme/mermaid.min.js","theme/mermaid-init.js"]

no-section-label = true

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.fold]
enable = true
level = 1
